<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mesa de Luz Zafiro</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f4f1ec;
}

.container {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 80px;
}

.titulo {
    font-size: 28px;
    font-weight: bold;
}

.producto-img {
    width: 350px;
}

.colores {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.color {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid #999;
}

/* Colores */
.negro { background-color: black; }
.arena { background-color: #c2a27c; }
.blanco { background-color: white; }
.gris { background-color: #808080; }

</style>
</head>

<body>

<div class="container">

    <!-- Sección izquierda -->
    <div class="titulo">
        Mesa de Luz Zafiro
    </div>

    <!-- Imagen en el medio -->
    <img src="zafiro.jpg" alt="Mesa de Luz Zafiro" class="producto-img">

    <!-- Paleta derecha -->
    <div class="colores">
        <div class="color negro"></div>
        <div class="color arena"></div>
        <div class="color blanco"></div>
        <div class="color gris"></div>
    </div>

</div>

</body>
</html>
